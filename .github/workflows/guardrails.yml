name: UI Guardrails

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  check-ui-imports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Run UI import guard
        run: |
          dart tools/guardrails/check_ui_imports.dart
