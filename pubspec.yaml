name: paperclip2
description: Un jeu incrémental de production de trombones avec des mécaniques de gestion et d'optimisation.
publish_to: 'none'
version: 2.2.0+18

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # Interface utilisateur
  provider: ^6.1.1
  fl_chart: ^1.2.0
  cupertino_icons: ^1.0.6
  uuid: ^4.5.1
  cached_network_image: ^3.2.3

  # Stockage et fichiers
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

  # Audio
  just_audio: ^0.10.5

  # Utilitaires
  archive: ^4.0.2
  intl: ^0.20.2
  logging: ^1.2.0
  flutter_dotenv: ^6.0.0
  json_annotation: ^4.11.0
  http: ^1.2.0

  # Google Play Games (optionnel, No-Op sur plateformes non supportées)
  games_services: ^5.0.0

  # Sécurité locale
  flutter_secure_storage: ^10.0.0

  # Firebase (FlutterFire v3)
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  mockito: ^5.4.4
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  mocktail: ^1.0.3
  integration_test:
    sdk: flutter

flutter_icons:
  android: "ic_launcher"
  ios: true
  image_path: "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png"
  adaptive_icon_background: "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_adaptive_back.png"
  adaptive_icon_foreground: "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_adaptive_fore.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/audio/screenmusic.wav
    - assets/audio/ambient-technology.wav
    - .env