name: paperclip2
description: Un jeu incrémental de production de trombones avec des mécaniques de gestion et d'optimisation.
publish_to: 'none'
version: 2.2.0+18

environment:
  sdk: '>=3.0.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Interface utilisateur
  provider: ^6.1.1
  fl_chart: ^0.70.0
  cupertino_icons: ^1.0.6
  uuid: ^4.5.1
  cached_network_image: ^3.2.3

  # Stockage et fichiers
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

  # Audio
  just_audio: ^0.9.36

  # Utilitaires
  archive: ^4.0.2
  intl: ^0.19.0
  logging: ^1.2.0
  flutter_dotenv: ^5.1.0
  json_annotation: ^4.8.1

  # Google Play Games (optionnel, No-Op sur plateformes non supportées)
  games_services: ^4.0.3

  # Sécurité locale
  flutter_secure_storage: ^9.2.4

  # Firebase (FlutterFire v3)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  mockito: ^5.4.4
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  mocktail: ^1.0.3
  integration_test:
    sdk: flutter

flutter_icons:
  android: "ic_launcher"
  ios: true
  image_path: "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png"
  adaptive_icon_background: "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_adaptive_back.png"
  adaptive_icon_foreground: "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_adaptive_fore.png"

dependency_overrides:
  analyzer: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/audio/screenmusic.wav
    - assets/audio/ambient-technology.wav
    - .env